<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>이용 후기 작성</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 40px; background-color: #f8f9fa; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #222; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .form-group textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-radius; resize: none; box-sizing: border-box; }
        .btn-submit { background-color: #ff3a5a; color: white; border: none; border-radius: 8px; padding: 14px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: #e62243; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <a href="/user/reservation-list" class="back-link">⬅️ 예약 내역으로 돌아가기</a>
    <h2>✨ 공간은 만족스러우셨나요?</h2>
    <p style="color: #777; font-size: 14px; margin-bottom: 25px;">유저님의 소중한 후기는 다른 이용자들에게 큰 도움이 됩니다.</p>

    <form action="/review/submit" method="post" enctype="multipart/form-data">
        
        <input type="hidden" name="reservationId" th:value="${reservationId}">

        <div class="form-group">
            <label for="rating">만족도 별점</label>
            <select name="rating" id="rating">
                <option value="5">⭐⭐⭐⭐⭐ (5점 - 최고예요)</option>
                <option value="4">⭐⭐⭐⭐ (4점 - 좋아요)</option>
                <option value="3">⭐⭐⭐ (3점 - 보통이에요)</option>
                <option value="2">⭐⭐ (2점 - 그냥 그래요)</option>
                <option value="1">⭐ (1점 - 아쉬워요)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="content">상세한 후기</label>
            <textarea name="content" id="content" placeholder="공간의 인테리어, 청결도, 친절함 등 좋았던 점을 공유해 주세요!"></textarea>
        </div>
        
        <div style="margin-top: 15px; padding: 10px; background-color: #f8f9fa; border-radius: 6px;">
	        <label style="font-weight: bold; font-size: 14px; color: #555;">📸 포토 후기 사진 첨부</label>
	        <input type="file" name="reviewImage" accept="image/*" style="display: block; margin-top: 5px; font-size: 13px;">
	    </div>

        <button type="submit" class="btn-submit">후기 등록하기</button>
    </form>
</div>

</body>
</html>
