<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>스페이스클라우드 - 로그인</title>
<style>
body {
    background-color: #f5f7fb;
    font-family: 'Malgun Gothic', sans-serif;
    margin: 0;
    padding: 0;
}

.login-container {
    width: 400px;
    margin: 100px auto;
    background: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    box-sizing: border-box;
}

.login-title {
    font-size: 26px;
    font-weight: bold;
    color: #333333;
    text-align: center;
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 14px;
    font-weight: bold;
    color: #555555;
    margin-bottom: 8px;
}

.form-control {
    width: 100%;
    padding: 12px;
    border: 1px solid #cccccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
}

.form-control:focus {
    border-color: #ff3a5a;
}

/* 에러 메시지 스타일 */
.error-msg {
    color: #dc3545;
    font-size: 13px;
    margin-bottom: 15px;
    font-weight: bold;
}

.btn-submit {
    width: 100%;
    padding: 14px;
    background: #ff3a5a;
    color: #ffffff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.btn-submit:hover {
    background: #e02c4b;
}

.join-link {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #666666;
}

.join-link a {
    color: #ff3a5a;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="login-container">
    <div class="login-title">로그인</div>

    <form action="/user/login" method="post">
        
        <div class="error-msg" th:if="${loginError != null}" th:text="${loginError}">
            아이디 혹은 비밀번호가 틀렸습니다.
        </div>

        <div class="form-group">
            <label for="loginId">아이디</label>
            <input type="text" id="loginId" name="loginId" class="form-control" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="btn-submit">로그인</button>
    </form>

    <div class="join-link">
        아직 회원이 아니신가요? <a href="/user/join">회원가입하기</a>
    </div>
</div>

</body>
</html>
