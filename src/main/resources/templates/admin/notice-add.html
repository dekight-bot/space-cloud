<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SpaceCloud 최고관리자 - 공지 작성</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f1f3f5; display: flex; min-height: 100vh; }
        aside { width: 260px; background-color: #1e1e2f; color: #fff; padding: 30px 20px; box-sizing: border-box; flex-shrink: 0; }
        aside h2 { color: #ff3a5a; font-size: 22px; margin: 0 0 40px 0; font-weight: 800; text-align: center; }
        aside ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        aside ul li a { display: flex; align-items: center; gap: 12px; color: #b3b3cc; text-decoration: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; font-size: 15px; transition: all 0.2s; }
        aside ul li a:hover, aside ul li a.active { background-color: #ff3a5a; color: #fff; }
        
        main { flex: 1; padding: 40px; box-sizing: border-box; }
        header { border-bottom: 2px solid #dee2e6; padding-bottom: 20px; margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 26px; color: #222; }
        
        .form-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); max-width: 800px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 14px; font-weight: bold; color: #444; }
        .form-group input, .form-group textarea { width: 100%; height: 45px; padding: 0 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .form-group textarea { height: 250px; padding: 12px; resize: none; font-family: inherit; line-height: 1.6; }
        
        .btn-submit { background-color: #ff3a5a; color: white; border: none; border-radius: 8px; height: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; width: 100%; margin-top: 10px; }
        .btn-submit:hover { background-color: #e62243; }
        .btn-cancel { display: block; text-align: center; color: #666; text-decoration: none; font-size: 14px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <aside>
        <h2>SpaceCloud Admin</h2>
        <ul>
            <li><a href="/admin/home"><span class="material-icons-sharp">dashboard</span> 대시보드 홈</a></li>
            <li><a href="/admin/spaces"><span class="material-icons-sharp">room</span> 공간 등록/관리</a></li>
            <li><a href="/admin/notices" class="active"><span class="material-icons-sharp">campaign</span> 공지사항 관리</a></li>
            <li><a href="/admin/reservations"><span class="material-icons-sharp">receipt_long</span> 전체 예약 현황</a></li>
            <li><a href="/admin/qna"><span class="material-icons-sharp">question_answer</span> Q&A 답변 관리</a></li>
            <li><a href="/" style="margin-top: 50px; background: #333;"><span class="material-icons-sharp">logout</span> 사용자 홈 이동</a></li>
        </ul>
    </aside>

    <main>
        <header>
            <h1>✨ 새로운 공지사항 작성</h1>
        </header>

        <div class="form-container">
            <form action="/admin/notices/add" method="post">
                
                <!-- 공지 제목 -->
                <div class="form-group">
                    <label>공지 제목</label>
                    <input type="text" name="title" placeholder="유저들에게 알릴 핵심 제목을 입력하세요." required>
                </div>
                
                <!-- 공지 내용 -->
                <div class="form-group">
                    <label>공지 내용 본문</label>
                    <textarea name="content" placeholder="공지할 상세 내용을 정성껏 작성해 주세요." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">공지사항 게시하기</button>
                <a href="/admin/notices" class="btn-cancel">취소하고 목록으로 돌아가기</a>
            </form>
        </div>
    </main>

</body>
</html>
