<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SpaceCloud 최고관리자 - 공지사항 관리</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f1f3f5; display: flex; min-height: 100vh; }
        aside { width: 260px; background-color: #1e1e2f; color: #fff; padding: 30px 20px; box-sizing: border-box; flex-shrink: 0; }
        aside h2 { color: #ff3a5a; font-size: 22px; margin: 0 0 40px 0; font-weight: 800; text-align: center; }
        aside ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        aside ul li a { display: flex; align-items: center; gap: 12px; color: #b3b3cc; text-decoration: none; padding: 12px 15px; border-radius: 8px; font-weight: bold; font-size: 15px; transition: all 0.2s; }
        aside ul li a:hover, aside ul li a.active { background-color: #ff3a5a; color: #fff; }
        
        main { flex: 1; padding: 40px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #dee2e6; padding-bottom: 20px; }
        header h1 { margin: 0; font-size: 26px; color: #222; }
        
        .btn-add { background-color: #ff3a5a; color: white; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; border: none; }
        .btn-add:hover { background-color: #e62243; }
        
        .table-container { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th { padding: 15px 12px; border-bottom: 2px solid #dee2e6; color: #666; font-weight: bold; }
        td { padding: 18px 12px; border-bottom: 1px solid #eee; color: #333; vertical-align: middle; }
        .btn-action { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; text-decoration: none; margin-right: 5px; }
        .btn-edit { background: #f1f3f5; color: #495057; }
        .btn-delete { background: #fff0f2; color: #ff3a5a; }
    </style>
</head>
<body>

   <aside>
		    <h2>SpaceCloud Admin</h2>
		    <ul>
		        <li><a href="/admin/home"><span class="material-icons-sharp">dashboard</span> 대시보드 홈</a></li>
		        <li><a href="/admin/users" class="active"><span class="material-icons-sharp">people</span> 회원 명단 관리</a></li>
		        <li><a href="/admin/spaces"><span class="material-icons-sharp">room</span> 공간 등록/관리</a></li>
		        <!-- 📢 내일 약속한 공지사항 메뉴 여기에 이식! -->
		        <li><a href="/admin/notices"><span class="material-icons-sharp">campaign</span> 공지사항 관리</a></li>
		        <li><a href="/admin/reservations"><span class="material-icons-sharp">receipt_long</span> 전체 예약 현황</a></li>
		        <li><a href="/admin/qna"><span class="material-icons-sharp">question_answer</span> Q&A 답변 관리</a></li>
		        <li><a href="/" style="margin-top: 50px; background: #333;"><span class="material-icons-sharp">logout</span> 사용자 홈 이동</a></li>
		    </ul>
		</aside>

    <main>
        <header>
            <h1>📢 공지사항 시스템 관리</h1>
            <a href="/admin/notices/add" class="btn-add">
                <span class="material-icons-sharp" style="font-size: 18px;">add</span> 새로운 공지 작성
            </a>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">번호</th>
                        <th>공지 제목</th>
                        <th style="width: 150px;">작성일</th>
                        <th style="width: 100px;">조회수</th>
                        <th style="width: 150px; text-align: center;">작업</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 🟢 타임리프로 실제 DB 공지사항 리스트 가동 -->
                    <tr th:each="notice : ${noticeList}">
                        <td th:text="${notice.id}" style="color: #888; font-weight: bold;">1</td>
                        <td th:text="${notice.title}" style="font-weight: bold; font-size: 15px;">공지사항 제목이 출력됩니다.</td>
                        <!-- 작성일 출력 (LocalDateTime 포맷 혹은 변수명에 맞게 매핑) -->
                        <td th:text="${notice.createdAt != null ? #strings.substring(notice.createdAt, 0, 10) : '-'}">2026-07-08</td>
                        <td th:text="${notice.views}" style="color: #888;">0</td>
                        <td style="text-align: center;">
                            <a th:href="@{/admin/notices/edit(id=${notice.id})}" class="btn-action btn-edit">수정</a>
                            <a th:href="@{/admin/notices/delete(id=${notice.id})}" class="btn-action btn-delete" onclick="return confirm('이 공지사항을 정말 삭제하시겠습니까?');">삭제</a>
                        </td>
                    </tr>
                    
                    <!-- 🔒 공지사항 데이터가 하나도 없을 때 뜨는 방어벽 -->
                    <tr th:if="${#lists.isEmpty(noticeList)}">
                        <td colspan="5" style="text-align: center; padding: 50px 0; color: #999;">현재 등록된 공지사항이 없습니다. 새로운 소식을 작성해 주세요.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
