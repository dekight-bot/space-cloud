<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공간 목록 보기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 1200px; margin: 0 auto; }
        h2 { color: #222; }
        .category-title { color: #ff3a5a; font-weight: bold; }
        /* 그리드 스타일: 여러 개가 나와도 자동으로 줄바꿈 되도록 설정 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-decoration: none; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="text-decoration: none; color: #666;">⬅️ 메인으로 돌아가기</a>
        
        <div style="margin: 20px 0; display: flex; gap: 10px;">
		    <a href="/space/list?category=all" 
		       th:style="'padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; ' + (${selectedCategory} == 'all' ? 'background: #ff3a5a; color: white;' : 'background: #eee; color: #666;')">전체보기</a>
		       
		    <a href="/space/list?category=파티룸" 
		       th:style="'padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; ' + (${selectedCategory} == '파티룸' ? 'background: #ff3a5a; color: white;' : 'background: #eee; color: #666;')">파티룸</a>
		       
		    <a href="/space/list?category=스터디룸" 
		       th:style="'padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; ' + (${selectedCategory} == '스터디룸' ? 'background: #ff3a5a; color: white;' : 'background: #eee; color: #666;')">스터디룸</a>
		
		    <a href="/space/list?category=오피스" 
		       th:style="'padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; ' + (${selectedCategory} == '오피스' ? 'background: #ff3a5a; color: white;' : 'background: #eee; color: #666;')">오피스</a>
		</div>
        
        <!-- 🟢 th:each 반복문으로 DB 데이터 출력 -->
        <div class="grid">
            <a th:each="space : ${spaces}" 
               th:href="@{/user/space/detail/{id}(id=${space.id})}" 
               class="card">
                
                <!-- 이미지: 첫 번째 이미지가 있다면 보여주고, 없으면 기본 이미지 -->
                <img th:src="${space.images != null && !space.images.isEmpty()} ? ${space.images[0].imageUrl} : '/img/slide01.jpg'" alt="공간 이미지">
                
                <h3 th:text="${space.name}">공간 이름</h3>
                <p th:text="${#numbers.formatInteger(space.pricePerHour, 0, 'COMMA')} + '원'">가격</p>
            </a>
            
            <!-- 데이터가 없을 경우 메시지 -->
            <div th:if="${#lists.isEmpty(spaces)}" style="padding: 20px; color: #999;">
                해당 카테고리에 등록된 공간이 없습니다.
            </div>
        </div>
    </div>
</body>
</html>
