<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>공지사항 - SpaceCloud</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 40px; background-color: #ffffff; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h2 { font-size: 26px; font-weight: bold; color: #222; margin-bottom: 30px; }
        .notice-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .notice-table th { border-bottom: 2px solid #111111; padding: 15px 10px; font-weight: bold; color: #333; font-size: 15px; }
        .notice-table td { border-bottom: 1px solid #eef2f6; padding: 18px 10px; color: #555; font-size: 15px; }
        .notice-table tr:hover { background-color: #fafafa; }
        .text-center { text-align: center; }
        .notice-link { color: #333333; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .notice-link:hover { color: #ff3a5a; text-decoration: underline; }
        .back-btn { display: inline-block; text-decoration: none; color: #666; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-btn">⬅️ 메인으로 돌아가기</a>
    <h2>📢 공지사항</h2>
    
    <table class="notice-table">
        <colgroup>
            <col style="width: 10%;">
            <col style="width: 55%;">
            <col style="width: 20%;">
            <col style="width: 15%;">
        </colgroup>
        <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성일</th>
                <th>조회수</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(noticeList)}">
                <td colspan="4" class="text-center" style="color: #999; padding: 40px 0;">등록된 공지사항이 없습니다.</td>
            </tr>
            
            <tr th:each="notice : ${noticeList}">
                <td class="text-center" th:text="${notice.id}">1</td>
                <td>              
                    <a th:href="@{/notice/detail/{id}(id=${notice.id})}" class="notice-link" th:text="${notice.title}">
				    시스템 정기 점검 안내문
					</a>
                </td>
                <td class="text-center" th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}">2026-07-01</td>
                <td class="text-center" th:text="${notice.views}">0</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
