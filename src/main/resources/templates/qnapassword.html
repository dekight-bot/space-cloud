<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>비밀번호 확인</title>
<link href="/css/main.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<style>
    body { background: #f5f7fb; font-family: Arial, sans-serif; }
    .box-container { width: 450px; margin: 150px auto; text-align: center; }
    .card-lock { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { font-size: 20px; margin-bottom: 10px; color: #333; }
    p { font-size: 14px; color: #666; margin-bottom: 20px; }
    .error-msg { color: #dc3545; font-size: 13px; margin-bottom: 15px; font-weight: bold; }
    input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; margin-bottom: 20px; outline: none; text-align: center; }
    .btn-area { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 12px; border-radius: 6px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; }
    .btn-submit { background: #0d6efd; color: white; }
    .btn-cancel { background: #6c757d; color: white; }
</style>
</head>
<body>
<div class="box-container">
    <div class="card-lock">
        <h2>🔒 비밀글 보기</h2>
        <p>이 글은 작성자가 제한한 비밀글입니다.<br>비밀번호를 입력해 주세요.</p>
        
        <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>
        
        <form action="/qna/password" method="post">
            <input type="hidden" name="id" th:value="${id}">
            
            <input type="password" name="inputPassword" placeholder="비밀번호 를 입력하세요" required autofocus>
            
            <div class="btn-area">
                <a th:href="@{/qna}" class="btn btn-cancel">목록으로</a>
                <button type="submit" class="btn btn-submit">확인</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
