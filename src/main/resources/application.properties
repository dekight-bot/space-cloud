spring.application.name=space


# 서버
server.port=8081

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# 1. 파일 하나당 최대 허용 용량 (10MB로 대폭 상향)
spring.servlet.multipart.max-file-size=10MB

# 2. 한 번의 요청에 포함된 총 파일 허용 용량 (50MB로 대폭 상향)
spring.servlet.multipart.max-request-size=50MB

# 3. 내장 서버(Tomcat) 자체의 파일 제한도 함께 해제 (413 에러 원천 차단)
server.tomcat.max-swallow-size=50MB
server.tomcat.max-http-form-post-size=50MB

# 기존 이미지 저장 절대 경로는 그대로 유지
file.upload-dir=C:/upload/

#Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

#MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/reservation_db
spring.datasource.username=root
spring.datasource.password=root0123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

